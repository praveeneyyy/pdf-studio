services:
  - type: web
    name: pdf-tools-backend
    env: node
    plan: starter
    runtime: node22
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: 3000
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        value: https://pdfly-tools.netlify.app
      - key: UPLOAD_DIR
        value: /opt/render/project/src/uploads
      - key: TEMP_DIR
        value: /opt/render/project/src/temp
    disk:
      name: uploads-temp
      mountPath: /opt/render/project/src/uploads
      sizeGB: 10
